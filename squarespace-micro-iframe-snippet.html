<!-- Squarespace home page micro widget -->
<iframe
  id="first100daysMicroWidget"
  src="https://jameshward3.github.io/Progress/micro-widget.html?v=1"
  title="First 100 Days Dashboard Summary"
  style="width:100%; height:190px; border:0; overflow:hidden;"
  scrolling="no"
  loading="lazy">
</iframe>
<script>
  window.addEventListener("message", function (event) {
    if (!event.data || event.data.type !== "first100days:micro-height") return;
    var frame = document.getElementById("first100daysMicroWidget");
    if (!frame) return;
    frame.style.height = Math.max(190, event.data.height) + "px";
  });
</script>
